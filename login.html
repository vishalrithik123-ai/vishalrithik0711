<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:linear-gradient(135deg,#4facfe,#00f2fe);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-box{
      width:350px;
      background:#fff;
      padding:40px 30px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .logo{
      width:80px;
      height:80px;
      margin:0 auto 20px;
      border-radius:50%;
      background:#4facfe;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:32px;
      font-weight:bold;
    }

    h2{
      margin-bottom:20px;
      color:#333;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      border:none;
      border-radius:6px;
      background:#4facfe;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#2f8df5;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="logo">L</div>

    <h2>Login</h2>

    <form>
      <input type="text" placeholder="Username" required>
      <input type="password" placeholder="Password" required>

      <button type="submit">Login</button>
    </form>
  </div>

</body>
</html>
